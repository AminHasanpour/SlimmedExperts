data:
  load:
    domains:
      - aircraft
      - cifar100
      - daimlerpedcls
      - dtd
      - gtsrb
      - imagenet12
      - omniglot
      - svhn
      - ucf101
      - vgg-flowers
    split:
      - train
      - test
      - validation
    data_dir: data  # Directory to store the downloaded datasets (null = default: ~/tensorflow_datasets/)
  preprocess:
    batch_size: 128
    shuffle: true
    shuffle_buffer_size: 1000
    augment: false
    prefetch: null  # Number of batches to prefetch (null = auto-tune)
    seed: 42  # Random seed for reproducibility (null = no seed)
