base:
  wandb:
    project: slimmed-experts
    run_name: null      # Name for the Weights & Biases run (null = auto-generated name)

  data:
    load:
      domains:
        - aircraft
        - cifar100
        - daimlerpedcls
        - dtd
        - gtsrb
        - omniglot
        - svhn
        - ucf101
        - vgg-flowers
      data_dir: data
    preprocess:
      batch_size: 128
      shuffle: true
      augment: false    # Whether to apply data augmentation (random crop, flip, color jitter, rotation, erasing). Only applies to training data.
      input_size: 74    # Final square image size fed to the model.
      normalize: true   # If true, normalize using per-domain mean/std computed from train split.
      seed: 42          # Random seed for reproducibility (null = no seed)

  model:
    backbone:
      class_path: slimmed_experts.models.backbones.mobilenet_v2.MobileNetV2Backbone
      args:
        width_mult: 1.0
        small_input: true
    head:
      class_path: slimmed_experts.models.heads.linear.LinearMultiHead
      args: {}

  train:
    total_steps: 1000
    learning_rate: 1e-3
    weight_decay: 0.0
    optimizer: adam
    scheduler: cosine   # LR scheduler: "cosine" (CosineAnnealingLR) or null to disable
    val_every_n_steps: 100
    output_dir: models  # Directory to save checkpoints (null = don't save)
    device: cpu         # Device to train on (e.g., "cpu", "cuda", "mps", etc.)

variants:
  - wandb:
      run_name: expert_0.5
    data:
      load:
        domains: [cifar100]
    model:
      backbone:
        args:
          width_mult: 0.5
    train:
      output_dir: models/expert_0.5

  - wandb:
      run_name: expert_1.0
    data:
      load:
        domains: [cifar100]
    model:
      backbone:
        args:
          width_mult: 1.0
    train:
      output_dir: models/expert_1.0

  - wandb:
      run_name: general_0.5
    model:
      backbone:
        args:
          width_mult: 0.5
    train:
      output_dir: models/general_0.5

  - wandb:
      run_name: general_1.0
    model:
      backbone:
        args:
          width_mult: 1.0
    train:
      output_dir: models/general_1.0
